<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CLT Market Compare · Longitude</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{ --primary:#03654e; --primary-dark:#05463a; --ink:#1d2b26; --muted:#6b7a74; --line:#e7ece9; --bg:#f3f6f4; }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);}
  header{background:var(--primary-dark);color:#eafaf3;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  header .spacer{flex:1;}
  header a.back{color:#bfe9d8;font-size:13px;text-decoration:none;border:1px solid #2b7d66;padding:6px 11px;border-radius:8px;white-space:nowrap;}
  header a.back:hover{background:#0a5a46;}
  header .chip{font-size:12px;color:#9fd6c3;}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .controls span{display:inline-flex;align-items:center;}
  .controls label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:#9fd6c3;margin-right:4px;}
  select{font-size:13px;padding:6px 9px;border-radius:8px;border:1px solid #2b7d66;background:#0a5a46;color:#eafaf3;cursor:pointer;}
  .modetog{display:inline-flex;gap:2px;background:#0a5a46;border:1px solid #2b7d66;border-radius:20px;padding:2px;}
  .modetog button{border:none;background:transparent;color:#bfe9d8;font-size:12px;font-weight:700;padding:5px 12px;border-radius:16px;cursor:pointer;}
  .modetog button.active{background:#eafaf3;color:var(--primary-dark);}
  .summary{padding:7px 18px;font-size:12.5px;color:var(--muted);background:#fff;border-bottom:1px solid var(--line);}
  .summary b{color:var(--ink);}
  .summary .note{color:#93857a;font-size:11.5px;}
  .wrap{display:grid;grid-template-columns:minmax(340px,1fr) minmax(360px,470px);gap:14px;padding:14px;align-items:stretch;}
  #map{height:560px;border-radius:12px;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .rail{display:flex;flex-direction:column;gap:14px;}
  /* Desktop app-shell */
  @media (min-width:901px){
    body{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{flex:0 0 auto;}
    .summary{flex:0 0 auto;}
    #root{flex:1 1 auto;min-height:0;display:flex;}
    .wrap{flex:1 1 auto;min-height:0;display:flex;}
    #map{flex:1 1 auto;min-height:0;height:auto;}
    .rail{flex:0 0 460px;min-height:0;overflow-y:auto;padding-right:4px;}
    .trend-wrap{flex:1 1 auto;min-height:0;}
  }
  @media (max-width:900px){ .wrap{grid-template-columns:1fr;} #map{height:380px;} .trend-wrap{grid-template-columns:1fr !important;} }
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden;flex:0 0 auto;}
  .card h2{margin:0;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:#fff;background:var(--primary);padding:9px 13px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .card h2 .sub{font-weight:500;text-transform:none;letter-spacing:0;color:#bfe9d8;font-size:11px;margin-left:auto;}
  .card .body{padding:6px 0;}
  .row{display:flex;align-items:center;gap:9px;padding:7px 13px;font-size:13px;border-bottom:1px solid #f4f6f5;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:#f5f8f6;}
  .row.us{background:#fff6ef;} .row.us:hover{background:#ffeede;}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(0,0,0,.15);}
  .rk{width:26px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;flex:0 0 auto;}
  .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nm small{color:var(--muted);font-weight:400;}
  .val{font-variant-numeric:tabular-nums;font-weight:600;flex:0 0 auto;}
  .val .delta{font-weight:600;font-size:11.5px;margin-left:6px;}
  .up{color:#1c8a4e;} .dn{color:#c0392b;}
  .op-pill{font-size:10.5px;color:var(--muted);background:#eef2f0;border-radius:20px;padding:1px 7px;margin-left:6px;}
  .prox-store{padding:9px 13px;border-bottom:1px solid #eef2f0;}
  .prox-store:last-child{border-bottom:none;}
  .prox-store .head{font-weight:700;font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
  .prox-store .vs{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:3px 0;}
  .prox-store .vs .who{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prox-store .vs .mi{color:var(--muted);font-size:11px;}
  .legend .li{display:flex;align-items:center;gap:7px;font-size:12px;padding:1px 0;}
  .leaflet-popup-content{font-size:12.5px;line-height:1.5;}
  .leaflet-popup-content .pt{font-weight:700;font-size:13px;}
  .loading{padding:40px;text-align:center;color:var(--muted);}
  .metric-note{font-size:11px;color:var(--muted);padding:4px 13px 10px;}
  .vsm{padding:12px 14px;}
  .vsm .big{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .vsm .ours{font-size:26px;font-weight:800;line-height:1;}
  .vsm .mkt{font-size:13px;color:var(--muted);}
  .vsm .chip{display:inline-block;font-size:13px;font-weight:800;padding:2px 9px;border-radius:20px;}
  .vsm .chip.up{background:#e4f6ea;color:#1c8a4e;} .vsm .chip.dn{background:#fbe7e5;color:#c0392b;}
  .vsm .meta{margin-top:9px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
  .vsm .meta b{color:var(--ink);font-size:13px;}
  /* Trends */
  .trend-wrap{display:grid;grid-template-columns:180px 1fr;overflow:hidden;}
  .trend-sidebar{background:#eef2f0;border-right:1px solid var(--line);padding:10px 0;overflow-y:auto;}
  .trend-sidebar-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:6px 14px 4px;}
  .tmetric-btn{display:block;width:100%;padding:8px 14px;border:none;background:none;text-align:left;font-size:12.5px;color:var(--ink);cursor:pointer;border-left:3px solid transparent;}
  .tmetric-btn:hover{background:rgba(0,0,0,.05);}
  .tmetric-btn.active{background:#fff;font-weight:600;border-left-color:var(--primary);color:var(--primary);}
  .trend-main{padding:14px 16px;display:flex;flex-direction:column;min-height:0;overflow-y:auto;}
  .trend-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .trend-title{font-size:16px;font-weight:700;color:var(--primary);}
  .trend-sub{font-size:12px;color:var(--muted);}
  .tsel{font-size:12px;padding:5px 9px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;}
  .tbtn{padding:4px 12px;border-radius:16px;border:1px solid var(--line);font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:var(--ink);}
  .tbtn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .chart-wrap{position:relative;flex:1 1 auto;min-height:300px;}
  .tlegend{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;}
  .tlegend .lg{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;border:1px solid var(--line);background:#fff;user-select:none;white-space:nowrap;}
  .tstats{display:flex;gap:12px;flex-wrap:wrap;margin:12px 0 2px;}
  .tstat{flex:1;min-width:150px;background:#f7f9f8;border:1px solid var(--line);border-radius:8px;padding:9px 13px;}
  .tstat.py{border-style:dashed;}
  .tstat .k{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
  .tstat .v{font-size:19px;font-weight:800;margin-top:2px;}
</style>
</head>
<body>
<header>
  <h1>🗺 CLT Market Compare</h1>
  <span class="modetog"><button id="mode-map" class="active" onclick="setMode('map')">🗺 Map</button><button id="mode-trends" onclick="setMode('trends')">📈 Trends</button><button id="mode-score" onclick="setMode('score')">🏆 Scoreboard</button></span>
  <div class="controls" id="map-controls">
    <span class="map-ctrl"><label>Timeframe</label><select id="sel-tf">
      <option value="week">Single week</option><option value="month">Month</option>
      <option value="ytd">Year to date</option><option value="range">Custom range</option>
    </select></span>
    <span class="map-ctrl" id="wrap-week"><label>Week</label><select id="sel-week"></select></span>
    <span class="map-ctrl" id="wrap-month" style="display:none;"><label>Month</label><select id="sel-month"></select></span>
    <span class="map-ctrl" id="wrap-ytd" style="display:none;"><label>Year</label><select id="sel-ytd"></select></span>
    <span class="map-ctrl" id="wrap-range" style="display:none;"><label>From</label><select id="sel-from"></select><label style="margin-left:8px;">To</label><select id="sel-to"></select></span>
    <span class="map-ctrl"><label>Compare</label><select id="sel-year"><option value="cur">This year</option><option value="prior">Prior year</option></select></span>
    <span class="map-ctrl"><label>Metric</label><select id="sel-metric"></select></span>
  </div>
  <div class="spacer"></div>
  <span class="chip" id="user-chip"></span>
  <a class="back" href="/dashboard.html">← Dashboard</a>
</header>
<div class="summary" id="summary"></div>
<div id="root"><div class="loading">Loading market data…</div></div>

<script>
// ── Config ────────────────────────────────────────────────────
const OPCOLOR = { Bullard:'#e8792b', Bloodworth:'#d12f2f', Brooker:'#2f6fd1', Naylor:'#e8c020', Shepherd:'#2e9e5b', Tapia:'#7d3fb3', Lamba:'#8a5a2b' };
const US = 'Bullard';
const US_RING = '#a1490f';
const OP_STYLE = { Bullard:'circle', Bloodworth:'triangle', Brooker:'rect', Naylor:'rectRot', Shepherd:'star', Tapia:'crossRot', Lamba:'rectRounded' };
const METRICS = [
  { k:'cc',      label:'Customer Count',    hi:true,  agg:'sum', fmt:v=>Math.round(v).toLocaleString() },
  { k:'sales',   label:'Total Sales',       hi:true,  agg:'sum', fmt:v=>'$'+Math.round(v).toLocaleString() },
  { k:'ccChg',   label:'CC Growth %',       hi:true,  agg:'calc',fmt:v=>v.toFixed(1)+'%' },
  { k:'cph',     label:'Cuts / Hour',       hi:true,  agg:'wt',  fmt:v=>v.toFixed(2) },
  { k:'invoice', label:'Avg Invoice',       hi:true,  agg:'calc',fmt:v=>'$'+v.toFixed(2) },
  { k:'product', label:'Product %',         hi:true,  agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'nr',      label:'New Cust Return %',  hi:true,  agg:'week',fmt:v=>v.toFixed(1)+'%' },
  { k:'rr',      label:'Repeat Return %',   hi:true,  agg:'week',fmt:v=>v.toFixed(1)+'%' },
  { k:'payroll', label:'Payroll %',         hi:false, agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'waits',   label:'Waits >15m %',      hi:false, agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'mbc',     label:'MBC (min)',         hi:false, agg:'wt',  fmt:v=>v.toFixed(2) },
  { k:'serviceSales', label:'Service Sales', hi:true,  agg:'sum', fmt:v=>'$'+Math.round(v).toLocaleString() },
  { k:'serviceDisc',  label:'Service Disc %',hi:false, agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'ssWaits',      label:'S/S Waits %',   hi:false, agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'nonOciWaits',  label:'Non-OCI Waits %',hi:false,agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'hcTime',       label:'HC Time (min)', hi:false, agg:'wt',  fmt:v=>v.toFixed(1) },
  { k:'avgEffWage',   label:'Avg Eff Wage',  hi:true,  agg:'wt',  fmt:v=>'$'+v.toFixed(2) },
  { k:'voidPct',      label:'Void %',        hi:false, agg:'wt',  fmt:v=>v.toFixed(2)+'%' },
  { k:'rating',  label:'Google Rating',     hi:true,  agg:'const', monthly:true, fmt:v=>v.toFixed(1)+'\u2605' },
  { k:'reviews', label:'Google Reviews',    hi:true,  agg:'const', monthly:true, fmt:v=>Math.round(v).toLocaleString() },
];
const SUM_COLS=['cc','sales','serviceSales','ccLY'], WT_COLS=['cph','product','payroll','waits','ssWaits','nonOciWaits','mbc','oci','newCust','serviceDisc','hcTime','avgEffWage','voidPct','regPrice','csPrice'], WEEK_ONLY=['nr','rr'];
const PROX_RADIUS_MI=3, PROX_MAX=3;
const MARKET_COLOR='#7a8a83';

// ── State ─────────────────────────────────────────────────────
let ALLROWS=[], WEEKS=[], WEEKSET=new Set(), BYWEEK={}, RATING_HISTORY=[], RH_BY_MONTH={}, SALON_OP={};
let ANCHOR=null, TF='week', RANGE={from:null,to:null}, PRIOR=false, CUR_METRIC='cc', STORE_OP_FILTER=US, MONTHSMAP={}, FYMAP={};
let MAP=null, MARKERS={}, ROWS=[], SCOPE=[];
let MODE='map';
// trends
let T_METRIC='cc', T_VIEW='lvm', T_SALON=null, T_WIN=20, T_PY=false, T_CHART=null, T_VISSNAP=null;

// ── Helpers ───────────────────────────────────────────────────
const metricDef = k => METRICS.find(m=>m.k===k);
const num = v => (v===null||v===undefined||v==='') ? null : (typeof v==='number'?v:parseFloat(v));
const hasVal = (r,k) => { const n=num(r[k]); return n!==null && Number.isFinite(n); };
const mean = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function _gpop(r){
  const status=(r.googleStatus==='CLOSED_TEMPORARILY')?' <span style="color:#c0392b;font-weight:700;">\u00b7 temporarily closed</span>':(r.googleStatus==='CLOSED_PERMANENTLY')?' <span style="color:#c0392b;font-weight:700;">\u00b7 permanently closed</span>':'';
  const body=hasVal(r,'rating')?('\u2B50 '+num(r.rating).toFixed(1)+(hasVal(r,'reviews')?' <span style="color:#6b7a74;">\u00b7 '+Math.round(num(r.reviews)).toLocaleString()+' reviews</span>':'')):'<span style="color:#6b7a74;">No Google rating yet</span>';
  return '<div style="margin-top:5px;font-size:12px;">'+body+status+'</div>';
}
function _pricePop(r){
  if(!hasVal(r,'regPrice')&&!hasVal(r,'csPrice')) return '';
  return '<div style="margin-top:3px;font-size:11.5px;color:#6b7a74;">\u2702 Reg $'+(hasVal(r,'regPrice')?num(r.regPrice).toFixed(0):'\u2014')+' \u00b7 Child/Sr $'+(hasVal(r,'csPrice')?num(r.csPrice).toFixed(0):'\u2014')+'</div>';
}
// full metric grid for the popup (short labels), rating/reviews/prices live in the header band
const GRID_METRICS=[
  {k:'cc',plabel:'CC',fmt:v=>Math.round(v).toLocaleString()},
  {k:'ccChg',plabel:'Growth',fmt:v=>(v>=0?'+':'')+v.toFixed(1)+'%'},
  {k:'sales',plabel:'Total Sales',fmt:v=>'$'+Math.round(v).toLocaleString()},
  {k:'serviceSales',plabel:'Svc Sales',fmt:v=>'$'+Math.round(v).toLocaleString()},
  {k:'invoice',plabel:'Avg Invoice',fmt:v=>'$'+v.toFixed(2)},
  {k:'cph',plabel:'CPH',fmt:v=>v.toFixed(2)},
  {k:'hcTime',plabel:'HC Time',fmt:v=>v.toFixed(1)},
  {k:'mbc',plabel:'MBC',fmt:v=>v.toFixed(2)},
  {k:'avgEffWage',plabel:'Eff Wage',fmt:v=>'$'+v.toFixed(2)},
  {k:'payroll',plabel:'Payroll',fmt:v=>v.toFixed(1)+'%'},
  {k:'product',plabel:'Product',fmt:v=>v.toFixed(1)+'%'},
  {k:'serviceDisc',plabel:'Svc Disc',fmt:v=>v.toFixed(1)+'%'},
  {k:'voidPct',plabel:'Void',fmt:v=>v.toFixed(2)+'%'},
  {k:'nr',plabel:'NR',fmt:v=>v.toFixed(1)+'%'},
  {k:'rr',plabel:'RR',fmt:v=>v.toFixed(1)+'%'},
  {k:'newCust',plabel:'New Cust',fmt:v=>v.toFixed(1)+'%'},
  {k:'oci',plabel:'% OCI',fmt:v=>v.toFixed(1)+'%'},
  {k:'waits',plabel:'Waits',fmt:v=>v.toFixed(1)+'%'},
  {k:'ssWaits',plabel:'S/S Waits',fmt:v=>v.toFixed(1)+'%'},
  {k:'nonOciWaits',plabel:'Non-OCI Wt',fmt:v=>v.toFixed(1)+'%'},
];
const _pv=(r,m)=>hasVal(r,m.k)?m.fmt(num(r[m.k])):'\u2014';
function buildPopup(r,rm,total){
  const d=metricDef(CUR_METRIC), us=r.do===US, col=OPCOLOR[r.do]||'#888';
  // header band: google + prices + closed
  const hp=[];
  if(hasVal(r,'rating')) hp.push('\u2B50 '+num(r.rating).toFixed(1)+(hasVal(r,'reviews')?' <span style="color:#6b7a74;">('+Math.round(num(r.reviews)).toLocaleString()+')</span>':''));
  if(hasVal(r,'regPrice')||hasVal(r,'csPrice')) hp.push('\u2702 $'+(hasVal(r,'regPrice')?num(r.regPrice).toFixed(0):'\u2014')+'/'+(hasVal(r,'csPrice')?num(r.csPrice).toFixed(0):'\u2014'));
  if(r.googleStatus==='CLOSED_TEMPORARILY') hp.push('<span style="color:#c0392b;font-weight:700;">temp closed</span>');
  else if(r.googleStatus==='CLOSED_PERMANENTLY') hp.push('<span style="color:#c0392b;font-weight:700;">closed</span>');
  const header=hp.length?'<div style="background:#f3f6f4;border-radius:6px;padding:4px 9px;margin:6px 0 5px;font-size:12.5px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;">'+hp.join('')+'</div>':'';
  // selected metric, called out with rank
  const sv=hasVal(r,CUR_METRIC)?d.fmt(num(r[CUR_METRIC])):'\u2014';
  const rankTxt=rm.has(r.salonNum)?'<span style="color:#6b7a74;font-weight:400;"> \u00b7 rank #'+rm.get(r.salonNum)+' of '+total+'</span>':'';
  const sel='<div style="background:'+fade(col,0.10)+';border-left:3px solid '+col+';border-radius:0 6px 6px 0;padding:5px 9px;margin-bottom:6px;font-size:13px;">'+esc(d.label)+': <b>'+sv+'</b>'+rankTxt+'</div>';
  // grid of everything else
  const cells=GRID_METRICS.filter(m=>m.k!==CUR_METRIC).map(m=>'<div style="display:flex;justify-content:space-between;gap:8px;border-bottom:1px solid #f1f4f2;padding:1px 0;"><span style="color:#7a8a83;">'+m.plabel+'</span><b style="white-space:nowrap;">'+_pv(r,m)+'</b></div>').join('');
  const grid='<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 16px;font-size:11.5px;">'+cells+'</div>';
  const link='<div style="margin-top:8px;"><a href="#" onclick="viewSalonTrend(\''+r.salonNum+'\');return false;" style="color:#03654e;font-weight:700;text-decoration:none;font-size:12px;">\uD83D\uDCC8 View trends \u2192</a></div>';
  return '<div class="pt" style="color:'+col+'">'+esc(r.name)+'</div><div><small>#'+esc(r.salonNum)+' \u00b7 '+esc(r.do)+(us?' (you)':'')+'</small></div>'+header+sel+grid+link;
}
function fmtWeek(iso){ const [y,mo,da]=iso.split('-'); return mo+'/'+da+'/'+y; }
function haversine(a,b,c,d){ const R=3958.8,t=Math.PI/180; const dLat=(c-a)*t,dLng=(d-b)*t; const x=Math.sin(dLat/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(dLng/2)**2; return 2*R*Math.asin(Math.sqrt(x)); }
function fade(hex,al){ const n=hex.replace('#',''); const r=parseInt(n.slice(0,2),16),g=parseInt(n.slice(2,4),16),b=parseInt(n.slice(4,6),16); return 'rgba('+r+','+g+','+b+','+al+')'; }
const P=s=>{ const[y,m,d]=s.split('-').map(Number); return Date.UTC(y,m-1,d); };
const ISO=t=>new Date(t).toISOString().slice(0,10);
const addDays=(t,n)=>t+n*86400000;
function firstFridayJan(y){ let d=Date.UTC(y,0,1); while(new Date(d).getUTCDay()!==5) d=addDays(d,1); return d; }
function fiscalYearOf(iso){ const t=P(iso); const y=new Date(t).getUTCFullYear(); return t>=firstFridayJan(y)?y:y-1; }
function sameMonth(a,b){ const A=new Date(P(a)),B=new Date(P(b)); return A.getUTCFullYear()===B.getUTCFullYear()&&A.getUTCMonth()===B.getUTCMonth(); }
function pyWeekOf(w){ const t=ISO(addDays(P(w),-364)); return WEEKSET.has(t)?t:null; }

// ── Scope + aggregation (map) ─────────────────────────────────
function baseWeeks(){
  if(TF==='month')  return WEEKS.filter(w=>sameMonth(w,ANCHOR));
  if(TF==='ytd'){ const start=firstFridayJan(fiscalYearOf(ANCHOR)); return WEEKS.filter(w=>P(w)>=start&&P(w)<=P(ANCHOR)); }
  if(TF==='range'&&RANGE.from&&RANGE.to){ const lo=RANGE.from<=RANGE.to?RANGE.from:RANGE.to,hi=RANGE.from<=RANGE.to?RANGE.to:RANGE.from; return WEEKS.filter(w=>w>=lo&&w<=hi); }
  return [ANCHOR];
}

// ══ SCOREBOARD MODE ═══════════════════════════════════════════
// Composite score: every scored metric is converted to a 0–100 percentile
// across all salons (flipped so 100 = best), then averaged. Percentiles keep
// one outlier from dominating and let metrics on different scales weigh equally.
// ── Weighted dimension model ───────────────────────────────────
// Metrics are grouped so related columns can't silently triple-count (the three
// wait metrics collapse to ONE sub-score). Each dimension is scored 0-100 as a
// weighted blend of its parts' percentiles, then dimensions are weighted into
// the composite. HC Time is scored as a BAND (ideal ~12-14 min) rather than
// "lower is better", matching the Salon Key Results standard.
const HC_IDEAL_LO=12, HC_IDEAL_HI=14, HC_FAST_PEN=35, HC_SLOW_PEN=20;
function hcBandScore(t){
  if(t>=HC_IDEAL_LO&&t<=HC_IDEAL_HI) return 100;
  const raw = t<HC_IDEAL_LO ? 100-(HC_IDEAL_LO-t)*HC_FAST_PEN : 100-(t-HC_IDEAL_HI)*HC_SLOW_PEN;
  return Math.max(0,Math.min(100,raw));
}

function _pctMap(pairs,hi){
  const n=pairs.length, map={};
  if(n===0) return map;
  if(n===1){ map[pairs[0].sn]=50; return map; }
  const sorted=pairs.map(x=>x.v).sort((a,b)=>a-b);
  pairs.forEach(x=>{
    let lo=0,eq=0;
    for(const s of sorted){ if(s<x.v) lo++; else if(s===x.v) eq++; }
    const p=((lo+0.5*eq)/n)*100;
    map[x.sn]=hi?p:100-p;
  });
  return map;
}
function computeScores(){
  const pct={};

  const need=new Set(); DIMS.forEach(d=>d.parts.forEach(p=>{ if(!p.k.startsWith('__')) need.add(p.k+'|'+p.hi); }));
  need.forEach(sig=>{ const [k,hi]=sig.split('|'); pct[k]=_pctMap(ROWS.filter(r=>hasVal(r,k)).map(r=>({sn:r.salonNum,v:num(r[k])})),hi==='true'); });
  // derived: waits combined (mean of the three flipped percentiles -> already 0-100 best-high)
  WAIT_KEYS.forEach(k=>{ if(!pct[k]) pct[k]=_pctMap(ROWS.filter(r=>hasVal(r,k)).map(r=>({sn:r.salonNum,v:num(r[k])})),false); });
  pct['__waits']={};
  ROWS.forEach(r=>{ const vs=WAIT_KEYS.map(k=>pct[k][r.salonNum]).filter(v=>v!==undefined); if(vs.length) pct['__waits'][r.salonNum]=mean(vs); });
  // derived: HC time band -> percentile of band score
  pct['__hcBand']=_pctMap(ROWS.filter(r=>hasVal(r,'hcTime')).map(r=>({sn:r.salonNum,v:hcBandScore(num(r.hcTime))})),true);

  return ROWS.map(r=>{
    const per={}, dim={};
    // keep per-metric percentiles for cell shading / scores view
    Object.keys(pct).forEach(k=>{ const v=pct[k][r.salonNum]; if(v!==undefined) per[k]=v; });
    let cw=0, cs=0;
    DIMS.forEach(d=>{
      let w=0,sum=0;
      d.parts.forEach(p=>{ const v=pct[p.k]?pct[p.k][r.salonNum]:undefined; if(v!==undefined){ sum+=v*p.w; w+=p.w; } });
      if(w>0){ const ds=sum/w; dim[d.id]=ds; cs+=ds*d.w; cw+=d.w; }
    });
    return { r, per, dim, score: cw>0 ? cs/cw : null };
  }).filter(x=>x.score!==null).sort((a,b)=>b.score-a.score);
}
function setDimW(id,v){ const d=DIMS.find(x=>x.id===id); if(d){ d.w=Math.max(0,parseFloat(v)||0); renderScoreboard(); } }
function resetDimW(){ const def={scale:15,growth:15,cx:25,speed:22,prod:15,rev:8}; DIMS.forEach(d=>d.w=def[d.id]); renderScoreboard(); }
function scColor(p){
  if(p===undefined) return 'background:#f7f9f8;color:#c3ccc8;';
  const t=p/100, r=Math.round(250-t*(250-225)), g=Math.round(232+t*(244-232)), b=Math.round(230-t*(230-233));
  const strong=p>=75||p<=25;
  return 'background:'+(p>=50?('rgba(28,138,78,'+(0.07+ (t-0.5)*0.5)+')'):('rgba(192,57,43,'+(0.07+(0.5-t)*0.5)+')'))+';'+(strong?'font-weight:700;':'');
}
function setScOp(v){ SC_OP=v; renderScoreboard(); }
function sortSc(k){ if(SC_SORT.k===k) SC_SORT.dir*=-1; else SC_SORT={k,dir:-1}; renderScoreboard(); }
function renderScoreboard(){
  const host=document.getElementById('scorewrap'); if(!host) return;
  let scored=computeScores();
  const ranks={}; scored.forEach((x,i)=>ranks[x.r.salonNum]=i+1);   // rank across ALL salons
  if(SC_OP!=='__ALL__') scored=scored.filter(x=>x.r.do===SC_OP);
  if(SC_SORT.k==='__score') scored.sort((a,b)=>(a.score-b.score)*SC_SORT.dir);
  else if(SC_SORT.k.startsWith('__d_')){ const id=SC_SORT.k.slice(4),d=SC_SORT.dir; scored.sort((a,b)=>{ const va=a.dim[id],vb=b.dim[id]; if(va===undefined&&vb===undefined)return 0; if(va===undefined)return 1; if(vb===undefined)return -1; return (va-vb)*d; }); }
  else { const k=SC_SORT.k,d=SC_SORT.dir; scored.sort((a,b)=>{ const va=hasVal(a.r,k)?num(a.r[k]):null, vb=hasVal(b.r,k)?num(b.r[k]):null; if(va===null&&vb===null)return 0; if(va===null)return 1; if(vb===null)return -1; return (va-vb)*d; }); }
  const ops=Object.keys(opCounts()).sort(), opOpts=['__ALL__',US].concat(ops.filter(o=>o!==US)).filter((v,i,a)=>a.indexOf(v)===i);
  const arrow=k=>SC_SORT.k===k?(SC_SORT.dir<0?' \u25BC':' \u25B2'):'';
  const DIMMODE=(SC_SHOW==='dims');
  const cols=DIMMODE?DIMS.map(d=>({k:'__d_'+d.id,lbl:d.lbl+' '+Math.round(d.w)+'%',tip:d.tip+' \u2014 '+d.parts.map(p=>p.lbl).join(', ')})):DATA_COLS;
  const head='<tr style="background:var(--primary);color:#fff;">'
    +'<th style="padding:7px 6px;text-align:right;position:sticky;top:0;background:var(--primary);z-index:3;">#</th>'
    +'<th style="padding:7px 8px;text-align:left;position:sticky;left:0;top:0;background:var(--primary);z-index:4;">Salon</th>'
    +'<th onclick="sortSc(\'__score\')" title="weighted composite" style="padding:7px 8px;cursor:pointer;white-space:nowrap;position:sticky;top:0;background:var(--primary);z-index:3;">Score'+arrow('__score')+'</th>'
    +cols.map(c=>{ const sm=DIMMODE||SCORED_KEYS.has(c.k); const tip=c.tip||(sm?'scored':'shown only \u2014 not scored'); return '<th onclick="sortSc(\''+c.k+'\')" title="'+tip+'" style="padding:7px 5px;cursor:pointer;white-space:nowrap;font-size:10.5px;position:sticky;top:0;background:var(--primary);z-index:3;'+(sm?'':'opacity:.72;')+'">'+c.lbl+arrow(c.k)+'</th>'; }).join('')
    +'</tr>';
  const body=scored.map(x=>{
    const us=x.r.do===US, col=OPCOLOR[x.r.do]||'#888';
    return '<tr style="border-bottom:1px solid #eef2f0;'+(us?'background:#fff6ef;':'')+'">'
      +'<td style="padding:5px 6px;text-align:right;color:#6b7a74;font-variant-numeric:tabular-nums;">'+ranks[x.r.salonNum]+'</td>'
      +'<td style="padding:5px 8px;white-space:nowrap;position:sticky;left:0;background:'+(us?'#fff6ef':'#fff')+';z-index:1;"><span class="dot" style="background:'+col+';display:inline-block;margin-right:6px;"></span><a href="#" onclick="viewSalonTrend(\''+x.r.salonNum+'\');return false;" style="color:inherit;text-decoration:none;font-weight:600;">'+esc(x.r.name)+'</a> <small style="color:#6b7a74;">#'+esc(x.r.salonNum)+(SC_OP==='__ALL__'?' \u00b7 '+esc(x.r.do):'')+'</small></td>'
      +'<td style="padding:5px 8px;text-align:center;font-weight:800;font-size:13px;color:'+(x.score>=50?'#1c8a4e':'#c0392b')+';">'+x.score.toFixed(1)+'</td>'
      +(DIMMODE
        ? DIMS.map(d=>{ const v=x.dim[d.id]; return '<td style="padding:5px 5px;text-align:center;font-size:11.5px;font-variant-numeric:tabular-nums;font-weight:600;'+scColor(v)+'">'+(v===undefined?'\u2014':v.toFixed(0))+'</td>'; }).join('')
        : DATA_COLS.map(c=>{
          const p=x.per[c.k], has=hasVal(x.r,c.k);
          const txt=(SC_SHOW==='scores')?(p===undefined?'\u2014':Math.round(p)):(has?c.fmt(num(x.r[c.k])):'\u2014');
          return '<td style="padding:5px 5px;text-align:center;font-size:11.5px;white-space:nowrap;font-variant-numeric:tabular-nums;'+scColor(p)+'">'+txt+'</td>';
        }).join(''))
      +'</tr>';
  }).join('');
  const allScored=computeScores();
  const mktRows=ROWS, liRows=ROWS.filter(r=>r.do===US);
  const mktScore=allScored.length?mean(allScored.map(x=>x.score)):null;
  const liScoreArr=allScored.filter(x=>x.r.do===US).map(x=>x.score);
  const liScore=liScoreArr.length?mean(liScoreArr):null;
  const dimAvg=(list)=>{ const o={}; DIMS.forEach(d=>{ const v=list.map(x=>x.dim[d.id]).filter(v=>v!==undefined); o[d.id]=v.length?mean(v):null; }); return o; };
  const liScoredRows=allScored.filter(x=>x.r.do===US);
  const avgRows=_avgRowHtml('MARKET AVG',mktRows,mktScore,'#eef2f0','#3d5c52',DIMMODE?dimAvg(allScored):null)
              +_avgRowHtml('LONGITUDE AVG',liRows,liScore,'#fff1e4',OPCOLOR[US],DIMMODE?dimAvg(liScoredRows):null);
  const tog=(v,l,pos)=>'<button onclick="setScShow(\''+v+'\')" style="border:1px solid var(--line);background:'+(SC_SHOW===v?'var(--primary)':'#fff')+';color:'+(SC_SHOW===v?'#fff':'var(--ink)')+';font-size:11px;font-weight:600;padding:3px 11px;cursor:pointer;border-radius:'+(pos==='l'?'14px 0 0 14px':(pos==='r'?'0 14px 14px 0':'0'))+';">'+l+'</button>';
  const totW=DIMS.reduce((a,d)=>a+d.w,0);
  const wEditor='<div style="padding:0 13px 10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--muted);">'
    +'<span style="font-weight:700;color:var(--ink);">Weights</span>'
    +DIMS.map(d=>'<span title="'+d.tip+'" style="display:inline-flex;align-items:center;gap:4px;">'+d.lbl
      +' <input type="number" min="0" max="100" step="1" value="'+d.w+'" onchange="setDimW(\''+d.id+'\',this.value)" style="width:48px;font-size:11.5px;padding:2px 4px;border:1px solid var(--line);border-radius:5px;text-align:center;"/></span>').join('')
    +'<span style="color:#93857a;">= '+totW+' (normalized)</span>'
    +'<button onclick="resetDimW()" style="border:1px solid var(--line);background:#fff;border-radius:12px;font-size:11px;padding:2px 10px;cursor:pointer;">Reset</button>'
    +'</div>';
  host.innerHTML='<div class="card" style="overflow:visible;">'
    +'<h2>All Salon Data<span class="sub">'+scored.length+' salons \u00b7 weighted composite score</span></h2>'
    +'<div style="padding:9px 13px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);">'
    +'<span>Operator <select onchange="setScOp(this.value)" style="font-size:12px;padding:3px 7px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;">'
    +opOpts.map(o=>'<option value="'+o+'"'+(o===SC_OP?' selected':'')+'>'+(o==='__ALL__'?'All operators':(o===US?o+' (you)':o))+'</option>').join('')+'</select></span>'
    +'<span style="display:inline-flex;">Show&nbsp;&nbsp;'+tog('values','Values','l')+tog('scores','Scores','m')+tog('dims','Dimensions','r')+'</span>'
    +'<span>Cell shading = percentile vs market (green better). Click a header to sort, a salon for trends.</span>'
    +'<button onclick="toggleScKey()" style="margin-left:auto;border:1px solid var(--line);background:'+(SC_KEY?'var(--primary)':'#fff')+';color:'+(SC_KEY?'#fff':'var(--ink)')+';border-radius:14px;font-size:11px;font-weight:700;padding:3px 12px;cursor:pointer;white-space:nowrap;">'+(SC_KEY?'\u25B4 Hide':'\u24D8 How scoring works')+'</button>'
    +'</div>'
    +scoringKeyHtml()
    +wEditor
    +'<div style="overflow:auto;max-height:calc(100vh - 230px);"><table style="width:100%;border-collapse:collapse;font-size:12px;"><thead>'+head+'</thead><tbody>'+avgRows+body+'</tbody></table></div></div>';
}

function renderTrends(){
  const main=document.getElementById('trend-main'); if(!main) return;
  if(metricDef(T_METRIC).noTrend){ T_METRIC='cc'; syncMetricSidebar(); }
  const d=metricDef(T_METRIC), weeks=trendWeeks(), labels=weeks.map(fmtWeek);
  if(T_CHART){ try{T_CHART.destroy();}catch(e){} T_CHART=null; }

  // View + salon controls
  const salons=ALLROWS.filter(x=>x.weekEnding===WEEKS[WEEKS.length-1]).slice().sort((a,b)=>(a.do===US?-1:b.do===US?1:0)||a.name.localeCompare(b.name));
  const salonOpts=salons.map(s=>'<option value="'+s.salonNum+'"'+(s.salonNum===T_SALON?' selected':'')+'>'+esc(s.name)+' #'+esc(s.salonNum)+' ('+esc(s.do)+')</option>').join('');
  const viewSel='<select class="tsel" onchange="setTView(this.value)">'+
    '<option value="lvm"'+(T_VIEW==='lvm'?' selected':'')+'>Longitude vs Market</option>'+
    '<option value="ops"'+(T_VIEW==='ops'?' selected':'')+'>All operators</option>'+
    '<option value="salon"'+(T_VIEW==='salon'?' selected':'')+'>Single salon</option></select>';
  const salonSel=T_VIEW==='salon'?'<select class="tsel" onchange="setTSalon(this.value)">'+salonOpts+'</select>':'';
  const wins=[{w:20,l:'20 wk'},{w:52,l:'52 wk'},{w:'ytd',l:'YTD'},{w:'all',l:'All'}].map(o=>{ const arg=typeof o.w==='string'?("'"+o.w+"'"):o.w; return '<button class="tbtn'+(T_WIN===o.w?' active':'')+'" onclick="setTWin('+arg+')">'+o.l+'</button>'; }).join('');
  const pyBtn='<button class="tbtn'+(T_PY?' active':'')+'" onclick="toggleTPY()" title="Overlay the same weeks one year earlier">'+(T_PY?'✓ ':'')+'Prior Year</button>';
  main.innerHTML=
    '<div class="trend-head"><div><div class="trend-title">'+d.label+' — trend</div><div class="trend-sub">'+weeks.length+' weeks · '+fmtWeek(weeks[0])+' → '+fmtWeek(weeks[weeks.length-1])+(d.monthly?' · monthly snapshots (builds over time)':'')+'</div></div>'+
    '<div style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">'+viewSel+salonSel+pyBtn+wins+'</div></div>'+
    '<div class="tstats" id="trend-stats"></div>'+
    '<div class="chart-wrap"><canvas id="trend-canvas"></canvas></div>'+
    '<div class="tlegend" id="trend-legend"></div>';

  const datasets=buildTrendDatasets(weeks,T_METRIC);
  const ctx=document.getElementById('trend-canvas');
  T_CHART=new Chart(ctx,{ type:'line', data:{labels,datasets}, options:{
    responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, animation:false,
    plugins:{ legend:{display:false}, tooltip:{ position:'nearest',
      callbacks:{ title:items=>'Week Ending '+(items[0]?.label||''),
        label:c=>{ if(c.parsed.y===null||c.parsed.y===undefined) return null; return ' '+c.dataset.label+': '+d.fmt(c.parsed.y); } } } },
    scales:{ x:{grid:{color:'#f0efec'},ticks:{font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:12}},
      y:{grid:{color:'#f0efec'},ticks:{font:{size:11},callback:v=>d.fmt(v)}} }
  }});
  // Restore visibility snapshot (metric/window/PY rebuilds keep your toggles)
  if(T_VISSNAP){ T_CHART.data.datasets.forEach((ds,i)=>{ const base=(ds.label||'').endsWith(' (PY)')?ds.label.slice(0,-5):(ds.label||''); if(Object.prototype.hasOwnProperty.call(T_VISSNAP,base)) T_CHART.setDatasetVisibility(i,T_VISSNAP[base]); }); T_CHART.update(); T_VISSNAP=null; }
  buildTrendLegend(); updateTrendStats();
}

function buildTrendLegend(){
  const el=document.getElementById('trend-legend'); if(!el||!T_CHART) return; el.innerHTML='';
  T_CHART.data.datasets.forEach((ds,idx)=>{
    if((ds.label||'').endsWith(' (PY)')) return;           // PY paired to parent, no own chip
    const chip=document.createElement('div'); chip.className='lg';
    const sw=document.createElement('span');
    if(ds.__ref) sw.innerHTML='<svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="'+ds.borderColor+'" stroke-width="2" stroke-dasharray="5,3"/></svg>';
    else sw.innerHTML=pointSVG(ds.pointStyle||'circle',ds.borderColor);
    const lb=document.createElement('span'); lb.textContent=ds.label;
    chip.appendChild(sw); chip.appendChild(lb);
    let hidden=!T_CHART.isDatasetVisible(idx);              // init from ACTUAL visibility (no flip-back bug)
    chip.style.opacity=hidden?'0.35':'1'; chip.style.textDecoration=hidden?'line-through':'none';
    chip.addEventListener('click',()=>{
      hidden=!hidden; T_CHART.setDatasetVisibility(idx,!hidden);
      const pyIdx=T_CHART.data.datasets.findIndex(x=>x.label===ds.label+' (PY)');   // pair PY exactly
      if(pyIdx>=0) T_CHART.setDatasetVisibility(pyIdx,!hidden);
      T_CHART.update(); chip.style.opacity=hidden?'0.35':'1'; chip.style.textDecoration=hidden?'line-through':'none'; updateTrendStats();
    });
    el.appendChild(chip);
  });
}
function updateTrendStats(){
  const host=document.getElementById('trend-stats'); if(!host||!T_CHART) return;
  const d=metricDef(T_METRIC), pts=arr=>arr.filter(v=>v!==null&&v!==undefined&&!isNaN(v));
  const primary=[]; let mktData=null;
  T_CHART.data.datasets.forEach((ds,i)=>{ const lbl=ds.label||''; if(lbl.endsWith(' (PY)')) return; if(!T_CHART.isDatasetVisible(i)) return; if(lbl==='Market Avg'){ mktData=ds.data; return; } if(ds.__ref) return; primary.push(...ds.data); });
  const selAvg=pts(primary).length?mean(pts(primary)):null;
  const mktAvg=mktData?(pts(mktData).length?mean(pts(mktData)):null):null;
  let boxes='<div class="tstat"><div class="k">Selected avg ('+trendWeeks().length+'wk)</div><div class="v" style="color:'+OPCOLOR[US]+'">'+(selAvg!==null?d.fmt(selAvg):'—')+'</div></div>'+
    '<div class="tstat"><div class="k">Market avg ('+trendWeeks().length+'wk)</div><div class="v" style="color:'+MARKET_COLOR+'">'+(mktAvg!==null?d.fmt(mktAvg):'—')+'</div></div>';
  if(T_PY){
    const py=[]; T_CHART.data.datasets.forEach((ds,i)=>{ if(!(ds.label||'').endsWith(' (PY)')) return; if(ds.label==='Market Avg (PY)') return; if(!T_CHART.isDatasetVisible(i)) return; py.push(...ds.data); });
    const pyAvg=pts(py).length?mean(pts(py)):null;
    boxes+='<div class="tstat py"><div class="k">Prior-year avg</div><div class="v" style="color:#999">'+(pyAvg!==null?d.fmt(pyAvg):'—')+'</div></div>';
  }
  host.innerHTML=boxes;
}

// ── Init ──────────────────────────────────────────────────────
fetch('/api/auth/me').then(r=>r.json()).then(me=>{
  if(!me||!me.access){ window.location.href='/dashboard.html'; return; }
  if(me.access.role==='none'){ document.getElementById('root').innerHTML='<div class="loading">Your account doesn’t have dashboard access yet.</div>'; return; }
  const chip=document.getElementById('user-chip'); if(chip) chip.textContent=me.email||'';
  loadAll().catch(e=>{ document.getElementById('root').innerHTML='<div class="loading">Failed to load market data: '+esc(e.message)+'</div>'; });
}).catch(()=>{ window.location.href='/dashboard.html'; });
</script>
