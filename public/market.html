<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CLT Market Compare · Longitude</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{ --primary:#03654e; --primary-dark:#05463a; --ink:#1d2b26; --muted:#6b7a74; --line:#e7ece9; --bg:#f3f6f4; }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);}
  header{background:var(--primary-dark);color:#eafaf3;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.02em;white-space:nowrap;}
  header .spacer{flex:1;}
  header a.back{color:#bfe9d8;font-size:13px;text-decoration:none;border:1px solid #2b7d66;padding:6px 11px;border-radius:8px;white-space:nowrap;}
  header a.back:hover{background:#0a5a46;}
  header .chip{font-size:12px;color:#9fd6c3;}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .controls span{display:inline-flex;align-items:center;}
  .controls label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:#9fd6c3;margin-right:4px;}
  select{font-size:13px;padding:6px 9px;border-radius:8px;border:1px solid #2b7d66;background:#0a5a46;color:#eafaf3;cursor:pointer;}
  .summary{padding:7px 18px;font-size:12.5px;color:var(--muted);background:#fff;border-bottom:1px solid var(--line);}
  .summary b{color:var(--ink);}
  .summary .note{color:#93857a;font-size:11.5px;}
  .wrap{display:grid;grid-template-columns:minmax(340px,1fr) minmax(360px,470px);gap:14px;padding:14px;align-items:stretch;}
  #map{height:560px;border-radius:12px;border:1px solid var(--line);box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .rail{display:flex;flex-direction:column;gap:14px;}
  /* Desktop: app-shell — map fills to the bottom, rail scrolls independently beside it */
  @media (min-width:901px){
    body{height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    header{flex:0 0 auto;}
    .summary{flex:0 0 auto;}
    #root{flex:1 1 auto;min-height:0;display:flex;}
    .wrap{flex:1 1 auto;min-height:0;display:flex;}
    #map{flex:1 1 auto;min-height:0;}
    .rail{flex:0 0 460px;min-height:0;overflow-y:auto;padding-right:4px;}
  }
  /* Mobile: normal page scroll, fixed-height map */
  @media (max-width:900px){ .wrap{grid-template-columns:1fr;} #map{height:380px;} }
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);overflow:hidden;}
  .card h2{margin:0;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:#fff;background:var(--primary);padding:9px 13px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .card h2 .sub{font-weight:500;text-transform:none;letter-spacing:0;color:#bfe9d8;font-size:11px;margin-left:auto;}
  .card .body{padding:6px 0;}
  .row{display:flex;align-items:center;gap:9px;padding:7px 13px;font-size:13px;border-bottom:1px solid #f4f6f5;}
  .row:last-child{border-bottom:none;}
  .row:hover{background:#f5f8f6;}
  .row.us{background:#fff6ef;} .row.us:hover{background:#ffeede;}
  .dot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(0,0,0,.15);}
  .rk{width:26px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;flex:0 0 auto;}
  .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .nm small{color:var(--muted);font-weight:400;}
  .val{font-variant-numeric:tabular-nums;font-weight:600;flex:0 0 auto;}
  .val .delta{font-weight:600;font-size:11.5px;margin-left:6px;}
  .up{color:#1c8a4e;} .dn{color:#c0392b;}
  .op-pill{font-size:10.5px;color:var(--muted);background:#eef2f0;border-radius:20px;padding:1px 7px;margin-left:6px;}
  .prox-store{padding:9px 13px;border-bottom:1px solid #eef2f0;}
  .prox-store:last-child{border-bottom:none;}
  .prox-store .head{font-weight:700;font-size:13px;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
  .prox-store .vs{display:flex;align-items:center;gap:9px;font-size:12.5px;padding:3px 0;}
  .prox-store .vs .who{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prox-store .vs .mi{color:var(--muted);font-size:11px;}
  .legend .li{display:flex;align-items:center;gap:7px;font-size:12px;padding:1px 0;}
  .leaflet-popup-content{font-size:12.5px;line-height:1.5;}
  .leaflet-popup-content .pt{font-weight:700;font-size:13px;}
  .loading{padding:40px;text-align:center;color:var(--muted);}
  .metric-note{font-size:11px;color:var(--muted);padding:4px 13px 10px;}
  /* vs-market headline card */
  .vsm{padding:12px 14px;}
  .vsm .big{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .vsm .ours{font-size:26px;font-weight:800;line-height:1;}
  .vsm .mkt{font-size:13px;color:var(--muted);}
  .vsm .chip{display:inline-block;font-size:13px;font-weight:800;padding:2px 9px;border-radius:20px;}
  .vsm .chip.up{background:#e4f6ea;color:#1c8a4e;} .vsm .chip.dn{background:#fbe7e5;color:#c0392b;}
  .vsm .meta{margin-top:9px;display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);}
  .vsm .meta b{color:var(--ink);font-size:13px;}
</style>
</head>
<body>
<header>
  <h1>🗺 CLT Market Compare</h1>
  <div class="controls">
    <span><label>Timeframe</label><select id="sel-tf">
      <option value="week">Single week</option>
      <option value="month">Month</option>
      <option value="ytd">Year to date</option>
      <option value="range">Custom range</option>
    </select></span>
    <span id="wrap-week"><label id="lbl-week">Week</label><select id="sel-week"></select></span>
    <span id="wrap-range" style="display:none;"><label>From</label><select id="sel-from"></select><label style="margin-left:8px;">To</label><select id="sel-to"></select></span>
    <span><label>Year</label><select id="sel-year"><option value="cur">This year</option><option value="prior">Prior year</option></select></span>
    <span><label>Metric</label><select id="sel-metric"></select></span>
  </div>
  <div class="spacer"></div>
  <span class="chip" id="user-chip"></span>
  <a class="back" href="/dashboard.html">← Dashboard</a>
</header>
<div class="summary" id="summary"></div>
<div id="root"><div class="loading">Loading market data…</div></div>

<script>
// ── Config ────────────────────────────────────────────────────
const OPCOLOR = {
  Bullard:'#e8792b', Bloodworth:'#d12f2f', Brooker:'#2f6fd1',
  Naylor:'#e8c020', Shepherd:'#2e9e5b', Tapia:'#7d3fb3', Lamba:'#8a5a2b'
};
const US = 'Bullard';       // Longitude = Trey's stores
const US_RING = '#a1490f';

const METRICS = [
  { k:'cc',      label:'Customer Count',    hi:true,  agg:'sum', fmt:v=>Math.round(v).toLocaleString() },
  { k:'sales',   label:'Total Sales',       hi:true,  agg:'sum', fmt:v=>'$'+Math.round(v).toLocaleString() },
  { k:'ccChg',   label:'CC Growth %',       hi:true,  agg:'calc',fmt:v=>v.toFixed(1)+'%' },
  { k:'cph',     label:'Cuts / Hour',       hi:true,  agg:'wt',  fmt:v=>v.toFixed(2) },
  { k:'invoice', label:'Avg Invoice',       hi:true,  agg:'calc',fmt:v=>'$'+v.toFixed(2) },
  { k:'product', label:'Product %',         hi:true,  agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'nr',      label:'New Cust Return %',  hi:true,  agg:'week',fmt:v=>v.toFixed(1)+'%' },
  { k:'rr',      label:'Repeat Return %',   hi:true,  agg:'week',fmt:v=>v.toFixed(1)+'%' },
  { k:'payroll', label:'Payroll %',         hi:false, agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'waits',   label:'Waits >15m %',      hi:false, agg:'wt',  fmt:v=>v.toFixed(1)+'%' },
  { k:'mbc',     label:'MBC (min)',         hi:false, agg:'wt',  fmt:v=>v.toFixed(2) },
];
const SUM_COLS = ['cc','sales','ccLY','salesLY'];
const WT_COLS  = ['cph','product','payroll','waits','ssWaits','mbc','oci','newCust'];
const WEEK_ONLY = ['nr','rr'];          // never aggregated across weeks
const PROX_RADIUS_MI = 3, PROX_MAX = 3;

// ── State ─────────────────────────────────────────────────────
let ALLROWS=[], WEEKS=[], WEEKSET=new Set();
let ANCHOR=null, TF='week', RANGE={from:null,to:null}, PRIOR=false;
let CUR_METRIC='cc', STORE_OP_FILTER=US;
let MAP=null, MARKERS={}, ROWS=[], SCOPE=[];

// ── Helpers ───────────────────────────────────────────────────
const metricDef = k => METRICS.find(m=>m.k===k);
const num = v => (v===null||v===undefined||v==='') ? null : (typeof v==='number'?v:parseFloat(v));
const hasVal = (r,k) => { const n=num(r[k]); return n!==null && Number.isFinite(n); };
const mean = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : null;
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtWeek(iso){ const [y,mo,da]=iso.split('-'); return mo+'/'+da+'/'+y; }
function haversine(a,b,c,d){ const R=3958.8,t=Math.PI/180; const dLat=(c-a)*t,dLng=(d-b)*t;
  const x=Math.sin(dLat/2)**2 + Math.cos(a*t)*Math.cos(c*t)*Math.sin(dLng/2)**2; return 2*R*Math.asin(Math.sqrt(x)); }

// date math (UTC)
const P = s => { const [y,m,d]=s.split('-').map(Number); return Date.UTC(y,m-1,d); };
const ISO = t => new Date(t).toISOString().slice(0,10);
const addDays = (t,n)=> t + n*86400000;
function firstFridayJan(y){ let d=Date.UTC(y,0,1); while(new Date(d).getUTCDay()!==5) d=addDays(d,1); return d; }
function fiscalYearOf(iso){ const t=P(iso); const y=new Date(t).getUTCFullYear(); return t>=firstFridayJan(y)?y:y-1; }
function sameMonth(a,b){ const A=new Date(P(a)),B=new Date(P(b)); return A.getUTCFullYear()===B.getUTCFullYear()&&A.getUTCMonth()===B.getUTCMonth(); }

// which weeks are in the selected scope
function baseWeeks(){
  if(TF==='month')  return WEEKS.filter(w=>sameMonth(w,ANCHOR));
  if(TF==='ytd'){ const start=firstFridayJan(fiscalYearOf(ANCHOR)); return WEEKS.filter(w=>P(w)>=start && P(w)<=P(ANCHOR)); }
  if(TF==='range' && RANGE.from && RANGE.to){ const lo=RANGE.from<=RANGE.to?RANGE.from:RANGE.to, hi=RANGE.from<=RANGE.to?RANGE.to:RANGE.from; return WEEKS.filter(w=>w>=lo && w<=hi); }
  return [ANCHOR];
}
function weeksInScope(){
  let ws = baseWeeks();
  if(PRIOR) ws = ws.map(w=>ISO(addDays(P(w),-364))).filter(w=>WEEKSET.has(w));
  return Array.from(new Set(ws)).filter(Boolean).sort();
}

// aggregate per salon across the scope's weeks
function aggregate(weeks){
  const set=new Set(weeks);
  const bySalon={};
  ALLROWS.forEach(r=>{ if(set.has(r.weekEnding)) (bySalon[r.salonNum]=bySalon[r.salonNum]||[]).push(r); });
  const multi = weeks.length>1;
  const out=[];
  for(const sn in bySalon){
    const rs=bySalon[sn].slice().sort((a,b)=> a.weekEnding<b.weekEnding?-1:1);
    if(!multi){ out.push(rs[rs.length-1]); continue; }   // single week → exact reported row
    const last=rs[rs.length-1];
    const a={ weekEnding:weeks[weeks.length-1], salonNum:sn, name:last.name, do:last.do, lat:last.lat, lng:last.lng, __agg:true };
    const sum={};
    SUM_COLS.forEach(k=>{ let s=0,any=false; rs.forEach(r=>{ const v=num(r[k]); if(v!==null){s+=v;any=true;} }); sum[k]=any?s:null; });
    const N=weeks.length;
    a.cc      = sum.cc==null?null:sum.cc/N;        // weekly average across the scope
    a.sales   = sum.sales==null?null:sum.sales/N;
    a.ccLY    = sum.ccLY==null?null:sum.ccLY/N;
    a.salesLY = sum.salesLY==null?null:sum.salesLY/N;
    a.invoice  = (sum.cc && sum.sales!=null) ? sum.sales/sum.cc : null;      // = avgSales/avgCC (exact)
    a.ccChg    = (sum.ccLY && sum.cc!=null)  ? (sum.cc/sum.ccLY-1)*100 : null;
    a.salesChg = (sum.salesLY && sum.sales!=null) ? (sum.sales/sum.salesLY-1)*100 : null;
    WT_COLS.forEach(k=>{ let wsum=0,vsum=0; rs.forEach(r=>{ const v=num(r[k]),c=num(r.cc); if(v!==null&&c!==null){vsum+=v*c;wsum+=c;} }); a[k]=wsum>0?vsum/wsum:null; });
    WEEK_ONLY.forEach(k=>a[k]=null);
    out.push(a);
  }
  return out;
}

function opCounts(){ const c={}; ROWS.forEach(r=>{c[r.do]=(c[r.do]||0)+1;}); return c; }
function rankMap(k){
  const d=metricDef(k);
  const vals=ROWS.filter(r=>hasVal(r,k)).map(r=>({sn:r.salonNum,v:num(r[k])}));
  vals.sort((a,b)=> d.hi ? b.v-a.v : a.v-b.v);
  const m=new Map(); vals.forEach((x,i)=>m.set(x.sn,i+1)); return m;
}
function marketAvg(k){ const vs=ROWS.filter(r=>hasVal(r,k)).map(r=>num(r[k])); return vs.length?mean(vs):null; }

// ── Load (once) ───────────────────────────────────────────────
async function loadAll(){
  const r = await fetch('/api/market/data?all=1').then(x=>x.json());
  if(!r || !r.success) throw new Error('market data load failed');
  ALLROWS = r.rows || [];
  WEEKS = (r.weeks||[]).slice().sort();
  WEEKSET = new Set(WEEKS);
  ANCHOR = WEEKS[WEEKS.length-1];
  RANGE = { from: WEEKS[Math.max(0,WEEKS.length-5)], to: WEEKS[WEEKS.length-1] };
  applyScope();
}
function applyScope(){ SCOPE = weeksInScope(); ROWS = aggregate(SCOPE); renderAll(); }

// ── Render ────────────────────────────────────────────────────
function renderAll(){
  buildShell();
  buildSelectors();
  renderSummary();
  const empty = ROWS.length===0;
  renderVsMarket(empty);
  renderScorecard(empty);
  renderAvgRank(empty);
  renderStoreRanks(empty);
  renderOutliers(empty);
  renderProximity(empty);
  renderMap();   // map handles empty gracefully (no pins)
}

function buildShell(){
  const root=document.getElementById('root');
  if(document.getElementById('map')) return;
  root.innerHTML =
    '<div class="wrap"><div id="map"></div><div class="rail">'+
      '<div class="card" id="c-vsmkt"></div>'+
      '<div class="card" id="c-score"></div>'+
      '<div class="card" id="c-avgrank"></div>'+
      '<div class="card" id="c-ranks"></div>'+
      '<div class="card" id="c-outliers"></div>'+
      '<div class="card" id="c-prox"></div>'+
    '</div></div>';
}

function buildSelectors(){
  const w=document.getElementById('sel-week');
  if(!w.dataset.built){
    const opts = WEEKS.slice().reverse().map(x=>'<option value="'+x+'">'+fmtWeek(x)+'</option>').join('');
    w.innerHTML=opts; w.value=ANCHOR;
    document.getElementById('sel-from').innerHTML=opts;
    document.getElementById('sel-to').innerHTML=opts;
    document.getElementById('sel-from').value=RANGE.from;
    document.getElementById('sel-to').value=RANGE.to;
    const m=document.getElementById('sel-metric');
    m.innerHTML=METRICS.map(x=>'<option value="'+x.k+'">'+x.label+'</option>').join(''); m.value=CUR_METRIC;

    w.onchange=()=>{ ANCHOR=w.value; applyScope(); };
    document.getElementById('sel-from').onchange=e=>{ RANGE.from=e.target.value; applyScope(); };
    document.getElementById('sel-to').onchange=e=>{ RANGE.to=e.target.value; applyScope(); };
    document.getElementById('sel-tf').onchange=e=>{ TF=e.target.value; syncControls(); applyScope(); };
    document.getElementById('sel-year').onchange=e=>{ PRIOR=(e.target.value==='prior'); applyScope(); };
    m.onchange=()=>{ CUR_METRIC=m.value; renderMetricDependent(); };
    w.dataset.built='1';
    syncControls();
  }
}
function syncControls(){
  const isRange = TF==='range';
  document.getElementById('wrap-range').style.display = isRange?'inline-flex':'none';
  document.getElementById('wrap-week').style.display  = isRange?'none':'inline-flex';
  document.getElementById('lbl-week').textContent = TF==='week'?'Week':(TF==='month'?'In month of':'As of');
}
function renderMetricDependent(){
  renderSummary();
  const empty=ROWS.length===0;
  renderVsMarket(empty); renderScorecard(empty); renderAvgRank(empty);
  renderStoreRanks(empty); renderOutliers(empty); renderProximity(empty); renderMap();
}

function scopeLabel(){
  const yr = PRIOR?' · Prior year':'';
  if(SCOPE.length===0) return 'No data for this selection'+yr;
  if(TF==='week')  return 'Week ending <b>'+fmtWeek(SCOPE[SCOPE.length-1])+'</b>'+yr;
  if(TF==='month') return '<b>Month</b> · '+SCOPE.length+' weeks ending in '+fmtWeek(SCOPE[SCOPE.length-1]).slice(0,2)+'/'+fmtWeek(SCOPE[SCOPE.length-1]).slice(6)+yr;
  if(TF==='ytd')   return '<b>YTD</b> · '+SCOPE.length+' weeks through '+fmtWeek(SCOPE[SCOPE.length-1])+yr;
  return '<b>Range</b> · '+SCOPE.length+' weeks '+fmtWeek(SCOPE[0])+'–'+fmtWeek(SCOPE[SCOPE.length-1])+yr;
}
function renderSummary(){
  const d=metricDef(CUR_METRIC);
  const multi=SCOPE.length>1;
  let note='';
  if(multi){
    if(d.agg==='week') note=' · <span class="note">'+d.label+' is single-week only — pick Single week to see it</span>';
    else if(d.agg==='sum') note=' · <span class="note">'+d.label+' = weekly average across '+SCOPE.length+' weeks</span>';
    else if(d.agg==='wt') note=' · <span class="note">'+d.label+' = customer-weighted across '+SCOPE.length+' weeks</span>';
    else note=' · <span class="note">'+d.label+' computed from '+SCOPE.length+'-week totals</span>';
  }
  document.getElementById('summary').innerHTML =
    scopeLabel()+' · <b>'+ROWS.length+'</b> salons · metric: <b>'+d.label+'</b>'+(d.hi?' (higher better)':' (lower better)')+note;
}

// vs-market headline
function renderVsMarket(empty){
  const el=document.getElementById('c-vsmkt'); const d=metricDef(CUR_METRIC);
  if(empty){ el.innerHTML='<h2>Longitude vs Market</h2><div class="metric-note">No data for this selection.</div>'; return; }
  const ours=ROWS.filter(r=>r.do===US && hasVal(r,CUR_METRIC)).map(r=>num(r[CUR_METRIC]));
  const all =ROWS.filter(r=>hasVal(r,CUR_METRIC)).map(r=>num(r[CUR_METRIC]));
  if(!ours.length || !all.length){
    el.innerHTML='<h2>Longitude vs Market</h2><div class="metric-note">'+d.label+' isn’t available for this timeframe.</div>'; return;
  }
  const oAvg=mean(ours), mAvg=mean(all), delta=oAvg-mAvg;
  const pct = mAvg ? (delta/Math.abs(mAvg))*100 : 0;
  const good = d.hi ? delta>=0 : delta<=0;
  // operator rank by avg value
  const byOp={}; ROWS.forEach(r=>{ if(hasVal(r,CUR_METRIC)) (byOp[r.do]=byOp[r.do]||[]).push(num(r[CUR_METRIC])); });
  const ordered=Object.entries(byOp).map(([op,vs])=>({op,avg:mean(vs)})).sort((a,b)=> d.hi ? b.avg-a.avg : a.avg-b.avg);
  const opRank=ordered.findIndex(x=>x.op===US)+1, opN=ordered.length;
  // avg store rank (position)
  const rm=rankMap(CUR_METRIC);
  const ourRanks=ROWS.filter(r=>r.do===US && rm.has(r.salonNum)).map(r=>rm.get(r.salonNum));
  const avgRank=ourRanks.length?mean(ourRanks):null;
  el.innerHTML =
    '<h2>Longitude vs Market<span class="sub">'+d.label+'</span></h2>'+
    '<div class="vsm">'+
      '<div class="big">'+
        '<span class="ours" style="color:'+OPCOLOR[US]+'">'+d.fmt(oAvg)+'</span>'+
        '<span class="chip '+(good?'up':'dn')+'">'+(delta>=0?'+':'−')+d.fmt(Math.abs(delta))+' ('+(pct>=0?'+':'−')+Math.abs(pct).toFixed(1)+'%)</span>'+
        '<span class="mkt">vs market '+d.fmt(mAvg)+'</span>'+
      '</div>'+
      '<div class="meta">'+
        '<span>Operator rank <b>#'+opRank+'</b> of '+opN+'</span>'+
        (avgRank!==null?'<span>Avg store rank <b>'+avgRank.toFixed(1)+'</b></span>':'')+
        '<span>Your stores <b>'+ours.length+'</b></span>'+
      '</div>'+
    '</div>';
}

// Map
function renderMap(){
  if(!MAP){
    MAP=L.map('map',{scrollWheelZoom:true}).setView([35.24,-80.83],10);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:'abcd'}).addTo(MAP);
    MAP._legend=L.control({position:'bottomleft'});
    MAP._legend.onAdd=function(){ const div=L.DomUtil.create('div'); div.id='map-legend'; div.style.cssText='background:#fff;padding:8px 10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.25);'; return div; };
    MAP._legend.addTo(MAP);
    window.addEventListener('resize',()=>{ if(MAP) MAP.invalidateSize(); });
    setTimeout(()=>{ if(MAP) MAP.invalidateSize(); }, 80);
  }
  Object.values(MARKERS).forEach(m=>MAP.removeLayer(m)); MARKERS={};
  const d=metricDef(CUR_METRIC); const pts=[];
  ROWS.forEach(r=>{
    const lat=num(r.lat),lng=num(r.lng); if(lat===null||lng===null) return;
    const us=r.do===US, col=OPCOLOR[r.do]||'#888';
    const mk=L.circleMarker([lat,lng],{radius:us?9:7,weight:us?3:1.4,color:us?US_RING:'#fff',fillColor:col,fillOpacity:.9}).addTo(MAP);
    const v=hasVal(r,CUR_METRIC)?d.fmt(num(r[CUR_METRIC])):'—';
    mk.bindPopup('<div class="pt" style="color:'+col+'">'+esc(r.name)+'</div>'+
      '<div><small>#'+esc(r.salonNum)+' · '+esc(r.do)+(us?' (you)':'')+'</small></div>'+
      '<div style="margin-top:5px;">'+d.label+': <b>'+v+'</b></div>'+
      '<div style="color:#6b7a74;font-size:11.5px;margin-top:3px;">CC '+(hasVal(r,'cc')?Math.round(num(r.cc)).toLocaleString():'—')+
        ' · CPH '+(hasVal(r,'cph')?num(r.cph).toFixed(2):'—')+
        ' · Sales $'+(hasVal(r,'sales')?Math.round(num(r.sales)).toLocaleString():'—')+'</div>');
    MARKERS[r.salonNum]=mk; pts.push([lat,lng]);
  });
  const counts=opCounts(); const order=Object.keys(OPCOLOR).filter(o=>counts[o]);
  const leg=document.getElementById('map-legend');
  if(leg) leg.innerHTML='<div class="legend">'+order.map(o=>'<div class="li"><span class="dot" style="background:'+OPCOLOR[o]+'"></span>'+o+(o===US?' (you)':'')+' <span style="color:#6b7a74;">'+counts[o]+'</span></div>').join('')+'</div>';
  if(pts.length && !MAP._fitted){ MAP.invalidateSize(); MAP.fitBounds(pts,{padding:[30,30]}); MAP._fitted=true; }
}
function emphasize(sn,on){
  const mk=MARKERS[sn]; if(!mk) return; const r=ROWS.find(x=>x.salonNum===sn); const us=r&&r.do===US;
  mk.setStyle({radius:on?(us?13:12):(us?9:7),weight:on?4:(us?3:1.4)}); if(on) mk.bringToFront();
}
function hoverRow(el,sn){
  el.addEventListener('mouseenter',()=>emphasize(sn,true));
  el.addEventListener('mouseleave',()=>emphasize(sn,false));
  el.addEventListener('click',()=>{ const mk=MARKERS[sn]; if(mk){ MAP.panTo(mk.getLatLng()); mk.openPopup(); } });
  el.style.cursor='pointer';
}

function renderScorecard(empty){
  const el=document.getElementById('c-score'); const d=metricDef(CUR_METRIC);
  if(empty){ el.innerHTML='<h2>Franchisee Scorecard</h2><div class="metric-note">No data.</div>'; return; }
  const byOp={}; ROWS.forEach(r=>{ if(hasVal(r,CUR_METRIC)) (byOp[r.do]=byOp[r.do]||[]).push(num(r[CUR_METRIC])); });
  const list=Object.entries(byOp).map(([op,vs])=>({op,avg:mean(vs),n:vs.length})).sort((a,b)=> d.hi ? b.avg-a.avg : a.avg-b.avg);
  el.innerHTML='<h2>Franchisee Scorecard<span class="sub">avg '+d.label+'</span></h2><div class="body">'+
    (list.length?list.map((x,i)=>'<div class="row'+(x.op===US?' us':'')+'"><span class="rk">'+(i+1)+'</span><span class="dot" style="background:'+(OPCOLOR[x.op]||'#888')+'"></span><span class="nm">'+x.op+(x.op===US?' <small>(you)</small>':'')+' <small>· '+x.n+' stores</small></span><span class="val">'+d.fmt(x.avg)+'</span></div>').join(''):'<div class="metric-note">'+d.label+' not available for this timeframe.</div>')+'</div>';
}

function renderAvgRank(empty){
  const el=document.getElementById('c-avgrank'); const d=metricDef(CUR_METRIC);
  if(empty){ el.innerHTML='<h2>Avg Store Rank</h2><div class="metric-note">No data.</div>'; return; }
  const rm=rankMap(CUR_METRIC);
  const byOp={}; ROWS.forEach(r=>{ if(rm.has(r.salonNum)) (byOp[r.do]=byOp[r.do]||[]).push(rm.get(r.salonNum)); });
  const list=Object.entries(byOp).map(([op,rs])=>({op,avg:mean(rs),n:rs.length})).sort((a,b)=>a.avg-b.avg);
  el.innerHTML='<h2>Avg Store Rank<span class="sub">by position · lower = better</span></h2><div class="body">'+
    '<div class="metric-note">Ranks all '+rm.size+' salons on '+d.label+', then averages each operator’s positions.</div>'+
    (list.length?list.map((x,i)=>'<div class="row'+(x.op===US?' us':'')+'"><span class="rk">'+(i+1)+'</span><span class="dot" style="background:'+(OPCOLOR[x.op]||'#888')+'"></span><span class="nm">'+x.op+(x.op===US?' <small>(you)</small>':'')+' <small>· '+x.n+' stores</small></span><span class="val">'+x.avg.toFixed(1)+'</span></div>').join(''):'<div class="metric-note">Not available for this timeframe.</div>')+'</div>';
}

function renderStoreRanks(empty){
  const el=document.getElementById('c-ranks'); const d=metricDef(CUR_METRIC);
  if(empty){ el.innerHTML='<h2>Store Ranks</h2><div class="metric-note">No data.</div>'; return; }
  const ops=Object.keys(opCounts());
  const opts=[US].concat(ops.filter(o=>o!==US).sort()).concat(['__ALL__']);
  const sel = opts.includes(STORE_OP_FILTER)?STORE_OP_FILTER:US; STORE_OP_FILTER=sel;
  let rows=ROWS.filter(r=>hasVal(r,CUR_METRIC));
  if(sel!=='__ALL__') rows=rows.filter(r=>r.do===sel);
  rows.sort((a,b)=> d.hi ? num(b[CUR_METRIC])-num(a[CUR_METRIC]) : num(a[CUR_METRIC])-num(b[CUR_METRIC]));
  const optHtml=opts.map(o=>{ const lbl=o==='__ALL__'?'All operators (full board)':(o===US?o+' (you)':o); return '<option value="'+o+'"'+(o===sel?' selected':'')+'>'+lbl+'</option>'; }).join('');
  el.innerHTML='<h2>Store Ranks<span class="sub"><select id="rank-op" style="font-size:11px;padding:2px 6px;">'+optHtml+'</select></span></h2><div class="body" id="rank-body">'+
    (rows.length?rows.map((r,i)=>'<div class="row'+(r.do===US?' us':'')+'" data-sn="'+r.salonNum+'"><span class="rk">'+(i+1)+'</span><span class="dot" style="background:'+(OPCOLOR[r.do]||'#888')+'"></span><span class="nm">'+esc(r.name)+' <small>#'+esc(r.salonNum)+'</small>'+(sel==='__ALL__'?'<span class="op-pill">'+esc(r.do)+'</span>':'')+'</span><span class="val">'+d.fmt(num(r[CUR_METRIC]))+'</span></div>').join(''):'<div class="metric-note">'+d.label+' not available for this timeframe.</div>')+'</div>';
  const rop=document.getElementById('rank-op'); if(rop) rop.onchange=function(){ STORE_OP_FILTER=this.value; renderStoreRanks(false); };
  document.querySelectorAll('#rank-body .row').forEach(x=>hoverRow(x,x.dataset.sn));
}

function renderOutliers(empty){
  const el=document.getElementById('c-outliers'); const d=metricDef(CUR_METRIC);
  const mAvg=empty?null:marketAvg(CUR_METRIC);
  if(empty||mAvg===null){ el.innerHTML='<h2>Where to Look</h2><div class="metric-note">'+(empty?'No data.':d.label+' not available for this timeframe.')+'</div>'; return; }
  const ours=ROWS.filter(r=>r.do===US && hasVal(r,CUR_METRIC)).map(r=>{ const v=num(r[CUR_METRIC]); const raw=v-mAvg; return {r,v,raw,good:d.hi?raw:-raw}; });
  const leads=ours.slice().sort((a,b)=>b.good-a.good).slice(0,3);
  const gaps =ours.slice().sort((a,b)=>a.good-b.good).slice(0,3);
  const line=o=>'<div class="row us" data-sn="'+o.r.salonNum+'"><span class="dot" style="background:'+OPCOLOR[US]+'"></span><span class="nm">'+esc(o.r.name)+' <small>#'+esc(o.r.salonNum)+'</small></span><span class="val">'+d.fmt(o.v)+'<span class="delta '+(o.good>=0?'up':'dn')+'">'+(o.raw>=0?'+':'−')+d.fmt(Math.abs(o.raw))+'</span></span></div>';
  el.innerHTML='<h2>Where to Look<span class="sub">vs market avg '+d.fmt(mAvg)+'</span></h2><div class="body">'+
    '<div class="metric-note" style="color:#1c8a4e;font-weight:700;">Biggest leads</div>'+leads.map(line).join('')+
    '<div class="metric-note" style="color:#c0392b;font-weight:700;margin-top:4px;">Biggest gaps</div>'+gaps.map(line).join('')+'</div>';
  document.querySelectorAll('#c-outliers .row').forEach(x=>hoverRow(x,x.dataset.sn));
}

function renderProximity(empty){
  const el=document.getElementById('c-prox'); const d=metricDef(CUR_METRIC);
  if(empty){ el.innerHTML='<h2>Proximity Head-to-Head</h2><div class="metric-note">No data.</div>'; return; }
  const ours=ROWS.filter(r=>r.do===US && num(r.lat)!==null && num(r.lng)!==null);
  const others=ROWS.filter(r=>r.do!==US && num(r.lat)!==null && num(r.lng)!==null);
  const html=ours.map(u=>{
    const uLat=num(u.lat),uLng=num(u.lng);
    let near=others.map(o=>({o,mi:haversine(uLat,uLng,num(o.lat),num(o.lng))})).sort((a,b)=>a.mi-b.mi);
    let pick=near.filter(x=>x.mi<=PROX_RADIUS_MI).slice(0,PROX_MAX);
    if(pick.length===0 && near.length) pick=[near[0]];
    const uv=hasVal(u,CUR_METRIC)?num(u[CUR_METRIC]):null;
    const vs=pick.map(x=>{ const ov=hasVal(x.o,CUR_METRIC)?num(x.o[CUR_METRIC]):null; let delta='';
      if(uv!==null&&ov!==null){ const raw=uv-ov; const good=d.hi?raw:-raw; delta='<span class="delta '+(good>=0?'up':'dn')+'">'+(raw>=0?'+':'−')+d.fmt(Math.abs(raw))+'</span>'; }
      return '<div class="vs"><span class="dot" style="background:'+(OPCOLOR[x.o.do]||'#888')+'"></span><span class="who">'+esc(x.o.name)+' <span class="mi">'+x.mi.toFixed(1)+' mi · '+esc(x.o.do)+'</span></span><span class="val">'+(ov!==null?d.fmt(ov):'—')+delta+'</span></div>'; }).join('');
    return '<div class="prox-store" data-sn="'+u.salonNum+'"><div class="head"><span class="dot" style="background:'+OPCOLOR[US]+'"></span>'+esc(u.name)+' <small style="color:#6b7a74;font-weight:400;">#'+esc(u.salonNum)+' · you '+(uv!==null?d.fmt(uv):'—')+'</small></div>'+(vs||'<div class="mi" style="color:#6b7a74;font-size:12px;">No competitors within '+PROX_RADIUS_MI+' mi</div>')+'</div>';
  }).join('');
  el.innerHTML='<h2>Proximity Head-to-Head<span class="sub">nearest ≤'+PROX_RADIUS_MI+' mi · '+d.label+'</span></h2><div class="body" style="padding:0;">'+html+'</div>';
  document.querySelectorAll('#c-prox .prox-store').forEach(x=>hoverRow(x,x.dataset.sn));
}

// ── Init: gate on shared session, then load once ──────────────
fetch('/api/auth/me').then(r=>r.json()).then(me=>{
  if(!me || !me.access){ window.location.href='/dashboard.html'; return; }
  if(me.access.role==='none'){ document.getElementById('root').innerHTML='<div class="loading">Your account doesn’t have dashboard access yet.</div>'; return; }
  const chip=document.getElementById('user-chip'); if(chip) chip.textContent=me.email||'';
  loadAll().catch(e=>{ document.getElementById('root').innerHTML='<div class="loading">Failed to load market data: '+esc(e.message)+'</div>'; });
}).catch(()=>{ window.location.href='/dashboard.html'; });
