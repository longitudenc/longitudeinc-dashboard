<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save-Route Lock Test</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f2;margin:0;padding:40px;color:#222;}
  .card{max-width:520px;margin:30px auto;background:#fff;border:1px solid #ddd;border-radius:12px;padding:26px;}
  h1{font-size:19px;color:#03654e;margin:0 0 6px;}
  p.sub{color:#666;font-size:13px;margin:0 0 18px;line-height:1.5;}
  button{background:#03654e;color:#fff;border:none;padding:11px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-right:8px;margin-bottom:10px;}
  button.gray{background:#666;}
  .out{margin-top:14px;padding:12px;border-radius:8px;font-size:13px;white-space:pre-wrap;word-break:break-word;display:none;}
  .out.locked{background:#e8f5ee;border:1px solid #a9d8bf;color:#0a5236;display:block;}
  .out.open{background:#fdecea;border:1px solid #f0b4ae;color:#8a1c12;display:block;}
  .status{font-size:13px;margin-bottom:14px;padding:8px 12px;border-radius:8px;background:#f0f0ee;}
</style>
</head>
<body>
  <div class="card">
    <h1>Save-Route Lock Test</h1>
    <p class="sub">This hits a protected save route (<code>saveDiscPoints</code>) with a harmless no-op and reports whether the server let it through.<br><br>
    <b>Logged out → should be BLOCKED (401/403).</b> That's the lock working.<br>
    <b>Logged in as owner/admin → should be ALLOWED.</b></p>

    <div class="status" id="session">Checking session…</div>

    <button onclick="testLock()">Test the lock</button>
    <button class="gray" onclick="window.location='/login-test.html'">Go sign in →</button>
    <button class="gray" onclick="logout()">Clear my session</button>

    <div class="out" id="out"></div>
  </div>
<script>
async function checkSession(){
  const el=document.getElementById('session');
  try{
    const r=await fetch('/api/auth/me');
    if(r.ok){ const d=await r.json(); el.textContent = d.access ? ('Signed in as: '+d.email+' (role: '+d.access.role+')') : 'Not signed in.'; }
    else { el.textContent='Not signed in (no /api/auth/me yet — that is fine for this test).'; }
  }catch(e){ el.textContent='Could not check session (the /api/auth/me route may not exist yet — fine).'; }
}
async function testLock(){
  const out=document.getElementById('out');
  out.className='out'; out.textContent='Testing…';
  try{
    // Harmless: try to REMOVE a non-existent eventId. If allowed, it just no-ops.
    const r=await fetch('/api/gs/saveDiscPoints',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'remove', eventId:'__lock_test_nonexistent__'})});
    const d=await r.json().catch(()=>({}));
    if(r.status===401||r.status===403){
      out.className='out locked';
      out.textContent='✓ BLOCKED ('+r.status+'): '+(d.error||'')+'\n\nThe lock is working — an unauthenticated request was rejected.';
    } else if(r.ok){
      out.className='out open';
      out.textContent='⚠ ALLOWED ('+r.status+'): the request went through.\n\nIf you are SIGNED IN as owner/admin, this is correct.\nIf you are SIGNED OUT, the lock is NOT working — tell Claude.';
    } else {
      out.className='out open';
      out.textContent='Unexpected ('+r.status+'): '+JSON.stringify(d);
    }
  }catch(e){ out.className='out open'; out.textContent='Request error: '+e.message; }
}
async function logout(){
  try{ await fetch('/api/auth/logout',{method:'POST'}); }catch(e){}
  document.getElementById('out').className='out';
  checkSession();
  alert('Session cleared (if the logout route exists). Re-run the test to confirm it is now blocked.');
}
checkSession();
</script>
</body>
</html>
